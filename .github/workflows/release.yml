name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Retermina ships macOS-only for now, so this builds a single universal
# (Apple Silicon + Intel) macOS app, signs it, generates the updater manifest
# (latest.json), and attaches everything to a GitHub Release. The in-app
# updater reads that release via the endpoint in tauri.conf.json:
#   https://github.com/matthewhamilton3141/Retermina/releases/latest/download/latest.json
#
# When Windows/Linux support lands, add them back as a build matrix.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # required so tauri-action can create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary needs both macOS arch targets available.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Guard against the "two builds, one release" desync. If this tag was
      # built before (e.g. the tag was moved and force-pushed), the release
      # already holds assets from that earlier, separately-signed build.
      # tauri-action re-uploads the binaries but can leave the *old* latest.json
      # in place — so the updater verifies the new tarball against a stale
      # signature and every client rejects the update. Wiping existing assets
      # first forces this run to regenerate a fully self-consistent set
      # (tarball + .sig + latest.json all from the same signing pass).
      - name: Clear stale assets from a previous build of this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' 2>/dev/null || true)
          if [ -n "$assets" ]; then
            echo "Release $tag already has assets from an earlier build — deleting them:"
            echo "$assets"
            for a in $assets; do gh release delete-asset "$tag" "$a" --yes; done
          else
            echo "No existing assets for $tag — clean build."
          fi

      - name: Build, sign, and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — added as repository secrets (see RELEASING.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Retermina ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install. The app auto-updates from here.'
          # Created as a draft so you can review/edit notes before publishing.
          # NOTE: the updater only sees a *published*, non-prerelease release.
          releaseDraft: true
          prerelease: false
          args: '--target universal-apple-darwin'
