name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
#
# This builds signed installers for macOS / Windows / Linux, generates the
# updater manifest (latest.json), and attaches everything to a GitHub Release.
# The in-app updater reads that release via the endpoint in tauri.conf.json:
#   https://github.com/matthewhamilton3141/Retermina/releases/latest/download/latest.json
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write # required so tauri-action can create the GitHub Release
    strategy:
      fail-fast: false # one platform failing shouldn't sink the others
      matrix:
        include:
          # macOS universal binary (Apple Silicon + Intel in one).
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # The universal macOS build needs both arch targets available.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build, sign, and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — these MUST be added as repository secrets.
          # See RELEASING.md. Without them the updater artifacts can't be signed.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Retermina ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install. The app auto-updates from here.'
          # Created as a draft so you can review/edit notes before publishing.
          # NOTE: the updater only sees a *published*, non-prerelease release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
